<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sistema Automotivo - Veículos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>🚗 Sistema Automotivo</h1>

<!-- ===================== LOGIN / CADASTRO ===================== -->
<div id="area-login">
    <h2>Entrar / Cadastrar</h2>
    <form id="form-login">
        <input type="text" id="login-nome" placeholder="Nome" required><br>
        <input type="email" id="login-email" placeholder="Email" required><br>
        <input type="tel" id="login-telefone" placeholder="Telefone" required><br>
        <button type="submit">Entrar / Cadastrar</button>
    </form>
    <div id="mensagemErro" style="color:red; margin-top:10px;"></div>
    <div id="mensagemSucesso" style="color:green; margin-top:10px;"></div>
</div>

<!-- ===================== ÁREA DE VEÍCULOS ===================== -->
<div id="area-veiculos">
    <h2>Gerenciar Veículos</h2>

    <form id="form-veiculo">
        <input type="text" id="veiculo-modelo" placeholder="Modelo" required>
        <input type="text" id="veiculo-marca" placeholder="Marca" required>
        <input type="number" id="veiculo-ano" placeholder="Ano" required>
        <input type="text" id="veiculo-cor" placeholder="Cor" required>
        <input type="number" id="veiculo-preco" placeholder="Preço" required step="0.01">
        <input type="number" id="veiculo-quilometragem" placeholder="Quilometragem" required>
        <input type="text" id="veiculo-status" placeholder="Status (disponível, vendido)" required>
        <input type="text" id="veiculo-imagem" placeholder="URL da Imagem">
        <button type="submit" id="btn-salvar">Salvar Veículo</button>
    </form>

    <input type="text" id="busca-veiculo" placeholder="Buscar por modelo">

    <div id="lista-veiculos"></div>
</div>

<script src="script.js"></script>
</body>
</html>
