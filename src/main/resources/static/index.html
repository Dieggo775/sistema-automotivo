<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sistema Automotivo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>🚗 Sistema Automotivo</h1>

<!-- Área de login/cadastro (opcional) -->
<div id="area-login">
    <h2>Entrar / Cadastrar</h2>
    <form id="form-login">
        <input type="text" id="login-nome" placeholder="Nome" required><br>
        <input type="email" id="login-email" placeholder="Email" required><br>
        <button type="submit">Entrar / Cadastrar</button>
    </form>
    <div id="mensagemErro" style="color:red;"></div>
    <div id="mensagemSucesso" style="color:green;"></div>
</div>

<!-- Área de Veículos -->
<div id="area-veiculos">
    <h2>Lista de Veículos</h2>
    <input type="text" id="busca" placeholder="Buscar por modelo">
    <div id="lista-veiculos"></div>
</div>

<script src="script.js"></script>
</body>
</html>
